name: .NET CI Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - "feature/**"

permissions:
  contents: read
  packages: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.fsproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # 🔐 Configure GitHub Packages authentication
      - name: Configure GitHub Packages source
        run: |
          dotnet nuget remove source CulturalShare || true
          dotnet nuget add source "https://nuget.pkg.github.com/YakovAkk/index.json" \
            --name "CulturalShare" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GH_PACKAGES_TOKEN }}" \
            --store-password-in-clear-text

      - name: Restore
        run: dotnet restore

      - name: Format Check
        run: dotnet format --verify-no-changes
        continue-on-error: true

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test with Coverage
        run: >
          dotnet test
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage
          path: |
            **/TestResults/**
            **/coverage.cobertura.xml
        if: always()

      - name: NuGet Vulnerability Scan
        run: dotnet list package --vulnerable

      - name: Publish
        run: dotnet publish --configuration Release --no-build --output ./out

      - name: Upload Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: ./out
